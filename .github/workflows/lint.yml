name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff-phase1:
    name: ruff (phase1-langgraph)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phase1-langgraph
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .
